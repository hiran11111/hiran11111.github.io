
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شركة سهول الوشم للمقاولات | Suhool Al-Washem Contracting Co.</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            direction: rtl;
            background-color: #f8f9fa;
            color: #333;
        }
        header {
            background: url('logo.png') center center no-repeat;
            background-size: contain;
            height: 200px;
            position: relative;
        }
        header h1 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 20px;
        }
        nav {
            background-color: #0066cc;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }
        .slider {
            width: 400px;
            height: 400px;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }
        .slides img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            opacity: 0;
            animation: slideShow 18s infinite;
            border-radius: 10px;
        }
        .slides img:nth-child(1) {animation-delay: 0s;}
        .slides img:nth-child(2) {animation-delay: 3s;}
        .slides img:nth-child(3) {animation-delay: 6s;}
        .slides img:nth-child(4) {animation-delay: 9s;}
        .slides img:nth-child(5) {animation-delay: 12s;}
        .slides img:nth-child(6) {animation-delay: 15s;}

        @keyframes slideShow {
            0% {opacity: 0;}
            5% {opacity: 1;}
            25% {opacity: 1;}
            30% {opacity: 0;}
            100% {opacity: 0;}
        }

        section {
            padding: 30px;
        }
        section h2 {
            text-align: center;
        }
        .gallery img {
            width: 30%;
            margin: 1%;
            border-radius: 5px;
        }
        form {
            max-width: 500px;
            margin: auto;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0 15px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #004080;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0066cc;
        }
        .map {
            text-align: center;
        }
        iframe {
            width: 90%;
            height: 400px;
            border: none;
            margin: 20px 0;
        }
        .social-icons {
            text-align: center;
            margin: 20px;
        }
        .social-icons img {
            width: 50px;
            margin: 0 10px;
        }
        footer {
            background-color: #004080;
            color: white;
            text-align: center;
            padding: 15px;
        }
        @media (max-width: 768px) {
            .gallery img {
                width: 80%;
            }
            .slider {
                width: 90%;
                height: auto;
            }
            .slides img {
                height: auto;
            }
            header {
                height: 150px;
            }
            header h1 {
                font-size: 16px;
                padding: 5px 10px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>شركة سهول الوشم للمقاولات | Suhool Al-Washem Contracting Co.</h1>
    </header>

    <nav>
        <a href="#about">من نحن | About Us</a>
        <a href="#services">خدماتنا | Our Services</a>
        <a href="#projects">مشاريعنا | Our Projects</a>
        <a href="#contact">تواصل معنا | Contact Us</a>
    </nav>

    <!-- Content remains unchanged for brevity -->

    <footer>
        &copy; 2025 شركة سهول الوشم للمقاولات | Suhool Al-Washem Contracting Co. - جميع الحقوق محفوظة | All Rights Reserved
    </footer>
</body>
</html>
